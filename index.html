<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komponisten Quiz - Wie gut kennst du die Klassik?</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 720px;
      margin: 40px auto;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; opacity: 0.9; margin-bottom: 30px; }
    
    .composer-image {
      width: 100%;
      max-width: 340px;
      height: 260px;
      object-fit: cover;
      border-radius: 16px;
      border: 6px solid rgba(255,255,255,0.4);
      display: block;
      margin: 20px auto 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .question { font-size: 1.35rem; margin: 20px 0 25px; text-align: center; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    button {
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { background: rgba(255,255,255,0.35); transform: translateX(8px); }
    button.correct { background: #4ade80 !important; color: black; }
    button.wrong { background: #f87171 !important; }

    .progress { height: 10px; background: rgba(255,255,255,0.3); border-radius: 5px; margin: 20px 0; }
    .progress-bar { height: 100%; background: #60a5fa; border-radius: 5px; width: 0%; transition: width 0.4s; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎼 Komponisten Quiz</h1>
    <p class="subtitle">Wie gut kennst du die großen Meister der Klassik?</p>

    <div id="startScreen">
      <button onclick="startQuiz()" style="font-size:1.4rem; padding:20px 40px; width:100%; background:#3b82f6;">
        Quiz starten (10 Fragen)
      </button>
    </div>

    <div id="quizScreen" class="hidden">
      <div class="progress"><div class="progress-bar" id="progress"></div></div>
      <p><strong>Frage <span id="currentQuestion">1</span>/10</strong></p>
      
      <img id="composerImage" class="composer-image" src="" alt="Komponist">
      
      <div class="question" id="questionText"></div>
      <div class="options" id="options"></div>
      
      <button onclick="nextQuestion()" id="nextBtn" class="hidden" style="margin-top:20px; width:100%;">Nächste Frage →</button>
    </div>

    <div id="resultScreen" class="hidden">
      <h2>Dein Ergebnis</h2>
      <div class="result" id="scoreText"></div>
      <p id="comment" style="font-size:1.3rem; margin:25px 0;"></p>
      <button onclick="restartQuiz()" style="padding:15px 30px; font-size:1.1rem;">Quiz neu starten</button>
    </div>
  </div>

  <script>
    const questions = [
      { question: "Wer komponierte die 'Mondscheinsonate'?", image: "beethoven.jpg", options: ["Mozart", "Beethoven", "Bach", "Chopin"], correct: 1 },
      { question: "Welcher Komponist wurde taub?", image: "beethoven.jpg", options: ["Beethoven", "Brahms", "Schubert", "Vivaldi"], correct: 0 },
      { question: "Welches Werk stammt von Antonio Vivaldi?", image: "vivaldi.webp", options: ["Die Zauberflöte", "Die vier Jahreszeiten", "Eine kleine Nachtmusik", "Die Unvollendete"], correct: 1 },
      { question: "In welcher Stadt wurde Mozart geboren?", image: "Mozart.jpg", options: ["Wien", "Berlin", "Salzburg", "Paris"], correct: 2 },
      { question: "Welcher Komponist ist bekannt für Walzer und Polonaisen?", image: "chopin.jpg", options: ["Debussy", "Chopin", "Tschaikowsky", "Gershwin"], correct: 1 },
      { question: "Wer komponierte 'Also sprach Zarathustra'?", image: "rstrauss.jpg", options: ["Richard Strauss", "Wagner", "Mahler", "Berlioz"], correct: 0 },
      { question: "Wie viele Sinfonien schrieb Beethoven?", image: "beethoven.jpg", options: ["5", "7", "9", "11"], correct: 2 },
      { question: "Wer gilt als 'Vater der Sinfonie'?", image: "jhaydn.jpg", options: ["Joseph Haydn", "Bach", "Händel", "Mendelssohn"], correct: 0 },
      { question: "Welches Instrument spielte Franz Liszt virtuos?", image: "liszt.png", options: ["Geige", "Klavier", "Cello", "Flöte"], correct: 1 },
      { question: "Wer komponierte den Hochzeitsmarsch?", image: "mendelssohn.jpg", options: ["Schumann", "Mendelssohn", "Berlioz", "Saint-Saëns"], correct: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
      currentQuestion = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('currentQuestion').textContent = currentQuestion + 1;
      document.getElementById('composerImage').src = q.image;

      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress').style.width = progress + '%';

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        optionsDiv.appendChild(btn);
      });

      document.getElementById('nextBtn').classList.add('hidden');
    }

    function selectAnswer(index, button) {
      const correctIndex = questions[currentQuestion].correct;
      const buttons = document.querySelectorAll('.options button');
      buttons.forEach(btn => btn.disabled = true);
      
      if (index === correctIndex) {
        button.classList.add('correct');
        score++;
      } else {
        button.classList.add('wrong');
        buttons[correctIndex].classList.add('correct');
      }
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quizScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      const percentage = Math.round((score / questions.length) * 100);
      let comment = percentage >= 90 ? "🎉 Du bist ein echter Klassik-Experte!" :
                    percentage >= 70 ? "Sehr gut! Du kennst dich richtig aus." :
                    percentage >= 50 ? "Nicht schlecht!" : "Mehr Klassik hören empfohlen 😊";

      document.getElementById('scoreText').innerHTML = `Du hast <strong>${score}/${questions.length}</strong> richtig! (${percentage}%)`;
      document.getElementById('comment').textContent = comment;
    }

    function restartQuiz() {
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
    }
  </script>
</body>
</html>
